<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Словник Андрія</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #faf6ee;
    --paper2: #f2ecdc;
    --ink: #2b2620;
    --ink-soft: #6e6555;
    --rule: #d8cdb4;
    --rust: #b5552c;
    --moss: #4d6b4f;
    --moss-bg: #e9f0e6;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    background-image:
      repeating-linear-gradient(transparent 0, transparent 31px, var(--rule) 31px, var(--rule) 32px);
    background-attachment: local;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 28px 20px 100px; }

  header { margin-bottom: 22px; }
  .eyebrow { font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--rust); margin-bottom:4px; }
  h1 { font-family:'Fraunces',serif; font-weight:700; font-size:2.1rem; color:var(--ink); line-height:1.1; }
  .sub { font-size:13px; color:var(--ink-soft); margin-top:6px; }

  .stats { display:flex; gap:10px; margin:18px 0 22px; }
  .stat { flex:1; background:var(--paper2); border:1px solid var(--rule); border-radius:4px; padding:10px 12px; text-align:center; }
  .stat-num { font-family:'Fraunces',serif; font-weight:700; font-size:1.4rem; color:var(--ink); }
  .stat-lbl { font-size:10px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.06em; margin-top:2px; }

  .add-box { background:#fff; border:1px solid var(--rule); border-radius:6px; padding:16px; margin-bottom:24px; box-shadow:0 2px 6px rgba(43,38,32,.05); }
  .add-row { display:flex; gap:8px; margin-bottom:8px; }
  .add-row input {
    flex:1; border:1px solid var(--rule); border-radius:4px; padding:10px 12px;
    font-family:'IBM Plex Sans',sans-serif; font-size:14px; color:var(--ink); background:var(--paper);
    outline:none;
  }
  .add-row input:focus { border-color:var(--rust); }
  .add-btn {
    background:var(--rust); color:#fff; border:none; border-radius:4px;
    padding:10px 18px; font-family:'IBM Plex Sans',sans-serif; font-weight:600; font-size:13px;
    cursor:pointer; white-space:nowrap;
  }
  .add-btn:active { transform: scale(.97); }
  .add-hint { font-size:11px; color:var(--ink-soft); }

  .filter-row { display:flex; gap:8px; margin-bottom:14px; overflow-x:auto; padding-bottom:2px; }
  .filter-btn {
    font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.04em; text-transform:uppercase;
    padding:6px 12px; border-radius:99px; border:1px solid var(--rule); background:#fff; color:var(--ink-soft);
    cursor:pointer; white-space:nowrap; flex-shrink:0;
  }
  .filter-btn.active { background:var(--ink); color:var(--paper); border-color:var(--ink); }

  .entry {
    background:#fff; border:1px solid var(--rule); border-radius:6px; padding:14px 16px; margin-bottom:10px;
    box-shadow:0 1px 4px rgba(43,38,32,.04);
  }
  .entry-head { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
  .word-row { display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
  .word-de { font-family:'Fraunces',serif; font-weight:600; font-size:1.15rem; color:var(--ink); }
  .word-ua { font-size:13px; color:var(--ink-soft); }
  .word-ua::before { content:'— '; }
  .entry-actions { display:flex; gap:6px; flex-shrink:0; }
  .icon-btn {
    width:30px; height:30px; border-radius:4px; border:1px solid var(--rule); background:var(--paper);
    cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center; color:var(--ink-soft);
  }
  .icon-btn:hover { background:var(--paper2); }
  .icon-btn.danger:hover { background:#fce8e3; border-color:#d98a73; color:var(--rust); }

  .examples { margin-top:10px; }
  .example-card { background:var(--moss-bg); border-radius:5px; padding:9px 11px; margin-top:6px; font-size:13px; }
  .ex-de { color:var(--ink); line-height:1.5; }
  .ex-ua { color:var(--moss); font-style:italic; margin-top:3px; line-height:1.4; font-size:12.5px; }

  .gen-btn {
    margin-top:10px; width:100%; background:var(--paper2); border:1px dashed var(--rule); border-radius:5px;
    padding:9px; font-family:'IBM Plex Sans',sans-serif; font-size:12.5px; color:var(--ink-soft); cursor:pointer;
  }
  .gen-btn:hover { background:#ece2c8; }
  .gen-btn:disabled { opacity:.5; cursor:default; }

  .toggle-ex-btn {
    margin-top:8px; background:none; border:1px solid var(--rule); border-radius:5px;
    padding:6px 12px; font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.03em;
    color:var(--ink-soft); cursor:pointer;
  }
  .toggle-ex-btn:hover { background:var(--paper2); }

  .mode-row { display:flex; gap:8px; margin-bottom:14px; }
  .mode-btn {
    flex:1; font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.03em; text-transform:uppercase;
    padding:9px; border-radius:5px; border:1px solid var(--rule); background:#fff; color:var(--ink-soft); cursor:pointer;
  }
  .mode-btn.active { background:var(--ink); color:var(--paper); border-color:var(--ink); }

  /* ── Картки ── */
  .card-scene { perspective:1200px; max-width:560px; margin:0 auto 18px; min-height:220px; }
  .card-inner { position:relative; width:100%; min-height:220px; height:auto; transform-style:preserve-3d; transition:transform .5s cubic-bezier(.4,0,.2,1); cursor:pointer; }
  .card-inner.flipped { transform:rotateY(180deg); }
  .card-face {
    position:absolute; inset:0; backface-visibility:hidden; display:flex; flex-direction:column;
    justify-content:center; align-items:center; padding:26px 22px; border:1px solid var(--rule);
    background:#fff; border-radius:8px; box-shadow:0 3px 14px rgba(43,38,32,.07); overflow-y:auto; box-sizing:border-box;
  }
  .card-face.back { transform:rotateY(180deg); background:var(--moss-bg); border-color:#b9cdb6; }
  .card-eyebrow { font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-soft); margin-bottom:10px; }
  .card-word { font-family:'Fraunces',serif; font-weight:700; font-size:1.6rem; color:var(--ink); text-align:center; }
  .card-ex { font-size:13px; color:var(--ink); margin-top:14px; line-height:1.55; text-align:left; border-top:1px solid var(--rule); padding-top:12px; }
  .card-ex .ua { color:var(--moss); font-style:italic; margin-top:5px; }
  .card-nav { display:flex; justify-content:space-between; align-items:center; margin:14px 0 24px; max-width:560px; margin-left:auto; margin-right:auto; }
  .card-nav-btn { background:#fff; border:1px solid var(--rule); border-radius:5px; padding:8px 16px; font-size:13px; color:var(--ink); cursor:pointer; }
  .card-nav-btn:disabled { opacity:.4; cursor:default; }
  .card-pos { font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink-soft); }
  .card-empty-hint { text-align:center; font-size:12px; color:var(--ink-soft); margin-bottom:14px; }

  /* ── Голосовий тренажер ── */
  .voice-card { background:#fff; border:1px solid var(--rule); border-radius:8px; padding:28px 22px; text-align:center; max-width:560px; margin:0 auto 18px; box-shadow:0 3px 14px rgba(43,38,32,.07); }
  .voice-word { font-family:'Fraunces',serif; font-weight:700; font-size:1.5rem; color:var(--ink); margin-bottom:6px; }
  .voice-ua { font-size:13px; color:var(--ink-soft); margin-bottom:20px; }
  .voice-mic-btn {
    width:74px; height:74px; border-radius:50%; border:none; background:var(--rust); color:#fff;
    font-size:28px; cursor:pointer; display:flex; align-items:center; justify-content:center; margin:0 auto 14px;
    box-shadow:0 3px 10px rgba(181,85,44,.35); transition:transform .15s;
  }
  .voice-mic-btn.listening { background:var(--moss); animation:pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(77,107,79,.4);} 50%{box-shadow:0 0 0 14px rgba(77,107,79,0);} }
  .voice-status { font-size:12.5px; color:var(--ink-soft); min-height:18px; margin-bottom:10px; }
  .voice-result { background:var(--moss-bg); border-radius:6px; padding:12px 14px; margin-top:8px; font-size:13px; color:var(--ink); text-align:left; display:none; }
  .voice-result.show { display:block; }
  .voice-feedback { margin-top:8px; font-size:12.5px; padding:8px 12px; border-radius:6px; text-align:left; display:none; }
  .voice-feedback.ok { display:block; background:var(--moss-bg); color:var(--moss); }
  .voice-feedback.bad { display:block; background:#fce8e3; color:var(--rust); }

  .empty { text-align:center; padding:50px 20px; color:var(--ink-soft); }
  .empty-glyph { font-family:'Fraunces',serif; font-size:2.5rem; color:var(--rule); margin-bottom:8px; }

  .spin { width:13px; height:13px; border:2px solid var(--rule); border-top-color:var(--rust); border-radius:50%; display:inline-block; animation:sp .7s linear infinite; vertical-align:-2px; }
  @keyframes sp { to { transform:rotate(360deg); } }

  .toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:var(--paper); padding:9px 18px; border-radius:99px;
    font-size:12.5px; font-weight:500; opacity:0; transition:opacity .3s; z-index:999; max-width:90vw; text-align:center;
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="eyebrow">Persönliches Vokabular</div>
    <h1>Словник Андрія</h1>
    <div class="sub">Слова, які зустрів десь — додав сюди, AI допомагає з прикладами.</div>
  </header>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="statTotal">0</div><div class="stat-lbl">слів</div></div>
    <div class="stat"><div class="stat-num" id="statDone">0</div><div class="stat-lbl">з прикладами</div></div>
    <div class="stat"><div class="stat-num" id="statToday">0</div><div class="stat-lbl">додано сьогодні</div></div>
  </div>

  <div class="add-box">
    <div class="add-row">
      <input id="inDe" type="text" placeholder="Слово німецькою...">
    </div>
    <div class="add-row">
      <input id="inUa" type="text" placeholder="Переклад (необов'язково — AI підставить)...">
      <button class="add-btn" onclick="addWord()">+ Додати</button>
    </div>
    <div class="add-hint">Якщо переклад не знаєш — залиш пусто, AI перекладе сам.</div>
  </div>

  <div class="mode-row">
    <button class="mode-btn active" data-m="list" onclick="setMode('list')">📋 Список</button>
    <button class="mode-btn" data-m="cards" onclick="setMode('cards')">🃏 Картки</button>
    <button class="mode-btn" data-m="voice" onclick="setMode('voice')">🎤 Голос</button>
  </div>

  <div id="listView">
    <div class="filter-row">
      <button class="filter-btn active" data-f="all" onclick="setFilter('all')">Усі</button>
      <button class="filter-btn" data-f="new" onclick="setFilter('new')">Без прикладів</button>
      <button class="filter-btn" data-f="done" onclick="setFilter('done')">З прикладами</button>
    </div>
    <div id="list"></div>
  </div>

  <div id="cardsView" style="display:none"></div>
  <div id="voiceView" style="display:none"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'andrii_word_dict_v1';
let words = [];
let filter = 'all';
let mode = 'list';
let exampleVisible = {};
let cardIdx = 0;
let cardFlipped = false;
let voiceIdx = 0;

function load() {
  try { words = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { words = []; }
}
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(words));
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.opacity = '0', 2200);
}

async function callAI(prompt) {
  const resp = await fetch('/api/claude', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt })
  });
  if (!resp.ok) throw new Error('Server error ' + resp.status);
  const data = await resp.json();
  if (data.error) throw new Error(data.error);
  return data.text || '';
}

function addWord() {
  const de = document.getElementById('inDe').value.trim();
  let ua = document.getElementById('inUa').value.trim();
  if (!de) { toast('Напиши слово німецькою'); return; }

  const entry = {
    id: Date.now(),
    de, ua,
    examples: [],
    added: new Date().toISOString()
  };
  words.unshift(entry);
  save();
  document.getElementById('inDe').value = '';
  document.getElementById('inUa').value = '';
  render();

  if (!ua) {
    translateWord(entry.id);
  }
}

async function translateWord(id) {
  const w = words.find(x => x.id === id);
  if (!w) return;
  try {
    const text = await callAI(`Переклади німецьке слово "${w.de}" українською. Дай тільки переклад, коротко, без пояснень, без розділових знаків навколо.`);
    w.ua = text.trim();
    save();
    render();
  } catch(e) {}
}

function deleteWord(id) {
  if (!confirm('Видалити слово?')) return;
  words = words.filter(w => w.id !== id);
  save();
  render();
}

function deleteExample(id, exIdx) {
  const w = words.find(x => x.id === id);
  if (!w) return;
  w.examples.splice(exIdx, 1);
  save();
  render();
}

async function generateExamples(id) {
  const w = words.find(x => x.id === id);
  if (!w) return;
  const btn = document.getElementById('gen-' + id);
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spin"></span> Генерую приклад...'; }

  const topics = [
    "робота і колеги в офісі", "побут вдома, прибирання, готування", "подорож або відпустка",
    "стосунки з друзями або сім'єю", "похід в магазин або ресторан", "спорт і здоров'я",
    "навчання або курси", "погода і плани на вихідні", "транспорт, дорога на роботу",
    "хобі і вільний час", "розмова по телефону з лікарем чи службою", "переїзд або пошук квартири"
  ];
  const topic = topics[Math.floor(Math.random()*topics.length)];

  try {
    const prompt = `Придумай 1 живий приклад речення німецькою (рівень B1-B2) зі словом "${w.de}" (${w.ua || 'переклад невідомий'}).
Контекст: ${topic}.
Речення має звучати природно в цьому контексті.
Відповідь ТІЛЬКИ JSON, без пояснень:
{"de":"речення","ua":"переклад"}`;

    const text = await callAI(prompt);
    const clean = text.replace(/```json|```/g, '').trim();
    const match = clean.match(/\{[\s\S]*?\}/);
    if (!match) throw new Error('parse');
    const parsed = JSON.parse(match[0]);
    w.examples = [{ de: parsed.de, ua: parsed.ua }];
    exampleVisible[w.id] = true;
    save();
    toast('✅ Приклад згенеровано');
    render();
  } catch(e) {
    toast('Помилка генерації, спробуй ще раз');
    render();
  }
}

function setFilter(f) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.f === f));
  render();
}

function toggleExample(id) {
  exampleVisible[id] = !exampleVisible[id];
  render();
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.m === m));
  document.getElementById('listView').style.display = m === 'list' ? 'block' : 'none';
  document.getElementById('cardsView').style.display = m === 'cards' ? 'block' : 'none';
  document.getElementById('voiceView').style.display = m === 'voice' ? 'block' : 'none';
  document.getElementById('examplesView').style.display = m === 'examples' ? 'block' : 'none';
  if (m === 'cards') { cardIdx = 0; cardFlipped = false; renderCards(); }
  if (m === 'voice') { spIdx = 0; renderVoice(); }
  if (m === 'examples') { exPIdx = 0; renderExamples(); }
}

function cardsPool() {
  return words.filter(w => w.examples.length > 0);
}

let cardExVisible = false;

function renderCards() {
  const pool = cardsPool();
  const el = document.getElementById('cardsView');
  if (!pool.length) {
    el.innerHTML = `<div class="empty"><div class="empty-glyph">—</div>Спочатку згенеруй приклади хоча б для одного слова.</div>`;
    return;
  }
  if (cardIdx >= pool.length) cardIdx = 0;
  if (cardIdx < 0) cardIdx = pool.length - 1;
  const w = pool[cardIdx];
  const ex = w.examples[0];

  el.innerHTML = `
    <div class="card-empty-hint">Картка ${cardIdx+1} / ${pool.length} · натисни щоб перевернути</div>
    <div class="card-scene">
      <div class="card-inner ${cardFlipped ? 'flipped' : ''}" onclick="flipCard()">
        <div class="card-face front">
          <div class="card-eyebrow">Deutsch</div>
          <div class="card-word">${escapeHtml(w.de)}</div>
        </div>
        <div class="card-face back">
          <div class="card-eyebrow">Українська</div>
          <div class="card-word" style="font-size:1.3rem">${escapeHtml(w.ua || '...')}</div>
          ${ex ? `
            <button class="toggle-ex-btn" style="margin-top:14px" onclick="event.stopPropagation(); toggleCardEx()">${cardExVisible ? '▴ Сховати приклад' : '▾ Показати приклад'}</button>
            ${cardExVisible ? `<div class="card-ex">${escapeHtml(ex.de)}<div class="ua">${escapeHtml(ex.ua)}</div></div>` : ''}
          ` : ''}
        </div>
      </div>
    </div>
    <div class="card-nav">
      <button class="card-nav-btn" onclick="cardStep(-1)">← Назад</button>
      <span class="card-pos">${cardIdx+1} / ${pool.length}</span>
      <button class="card-nav-btn" onclick="cardStep(1)">Далі →</button>
    </div>
  `;
}

function toggleCardEx() {
  cardExVisible = !cardExVisible;
  renderCards();
  // Зберігаємо стан перевернутості після ререндеру
  const inner = document.querySelector('.card-inner');
  if (inner) inner.classList.add('flipped');
}

function flipCard() {
  cardFlipped = !cardFlipped;
  if (!cardFlipped) cardExVisible = false;
  const inner = document.querySelector('.card-inner');
  if (inner) inner.classList.toggle('flipped', cardFlipped);
}

function cardStep(dir) {
  cardIdx += dir;
  cardFlipped = false;
  cardExVisible = false;
  renderCards();
}

// ── Голосовий тренажер (вимова одного слова) ──
let spRecognition = null;
let spListening = false;
let spIdx = 0;
let spCorrect = 0;
let spWrong = 0;

function spPool() {
  return words;
}

function spCleanWord(de) {
  return de
    .replace(/^(der|die|das|der\/die)\s+/i, '')
    .replace(/,.*$/, '')
    .replace(/\s*\(.*?\)/g, '')
    .replace(/\s*\+.*$/, '')
    .trim();
}

function renderVoice() {
  if (spRecognition) { try { spRecognition.abort(); } catch(e){} spListening = false; }
  const pool = spPool();
  const el = document.getElementById('voiceView');
  if (!pool.length) {
    el.innerHTML = `<div class="empty"><div class="empty-glyph">—</div>Спочатку додай хоча б одне слово.</div>`;
    return;
  }
  if (spIdx >= pool.length) spIdx = 0;
  if (spIdx < 0) spIdx = pool.length - 1;
  const w = pool[spIdx];

  el.innerHTML = `
    <div class="card-empty-hint">Слово ${spIdx+1} / ${pool.length}</div>
    <div class="stats" style="margin-bottom:14px">
      <div class="stat"><div class="stat-num" style="color:var(--moss)">${spCorrect}</div><div class="stat-lbl">правильно</div></div>
      <div class="stat"><div class="stat-num" style="color:var(--rust)">${spWrong}</div><div class="stat-lbl">помилок</div></div>
    </div>
    <div class="voice-card">
      <div class="voice-ua" style="margin-bottom:14px">${escapeHtml(w.ua || '')}</div>
      <div class="sp-word" id="spWord" onclick="spReveal()">${escapeHtml(w.de)}</div>
      <div id="spHint" style="font-size:11px;color:var(--ink-soft);margin-top:8px">👆 Натисни щоб підказати</div>
      <div id="spResult" class="sp-result"></div>
      <button class="voice-mic-btn" id="spMicBtn" onclick="spListen()" style="margin-top:16px">🎤</button>
      <div class="voice-status" id="spStatus">Натисни 🎤 і вимов слово по-німецьки</div>
    </div>
    <div class="card-nav">
      <button class="card-nav-btn" onclick="spStep(-1)">← Назад</button>
      <span class="card-pos">${spIdx+1} / ${pool.length}</span>
      <button class="card-nav-btn" onclick="spStep(1)">Далі →</button>
    </div>
  `;
}

function spReveal() {
  const el = document.getElementById('spWord');
  const hint = document.getElementById('spHint');
  if (el) el.style.filter = 'none';
  if (hint) hint.textContent = '';
}

function spStep(dir) {
  if (spRecognition) { try { spRecognition.abort(); } catch(e){} spListening = false; }
  spIdx += dir;
  renderVoice();
}

function spListen() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const statusEl = document.getElementById('spStatus');
  if (!SpeechRecognition) {
    if (statusEl) statusEl.textContent = '❌ Тільки Chrome підтримує розпізнавання';
    return;
  }
  if (spListening) return;
  if (spRecognition) { try { spRecognition.abort(); } catch(e){} }

  const pool = spPool();
  const w = pool[spIdx];
  const target = spCleanWord(w.de);

  const recognition = new SpeechRecognition();
  recognition.lang = 'de-DE';
  recognition.interimResults = false;
  recognition.maxAlternatives = 5;
  recognition.continuous = false;
  spRecognition = recognition;
  spListening = true;

  const micBtn = document.getElementById('spMicBtn');
  if (micBtn) micBtn.classList.add('listening');
  if (statusEl) statusEl.textContent = '🎙️ Слухаю… говори зараз!';

  const resetMic = () => {
    spListening = false;
    if (micBtn) micBtn.classList.remove('listening');
  };

  recognition.onresult = (event) => {
    resetMic();
    const alternatives = [];
    for (let i = 0; i < event.results[0].length; i++) {
      alternatives.push(event.results[0][i].transcript.toLowerCase().trim());
    }
    const heard = alternatives[0];
    const t = target.toLowerCase().replace(/[^a-zäöüß\s]/gi, '').trim();
    const isCorrect = alternatives.some(alt => {
      const a = alt.replace(/[^a-zäöüß\s]/gi, '').trim();
      return a === t || a.includes(t) || t.includes(a) || spLevenshtein(a, t) <= Math.max(1, Math.floor(t.length * 0.3));
    });
    spShowResult(isCorrect, heard, target);
  };

  recognition.onerror = (event) => {
    resetMic();
    const msgs = {
      'not-allowed': '❌ Дозволь мікрофон у браузері!',
      'no-speech': '🔇 Не почув. Говори голосніше.',
      'network': '🌐 Потрібен інтернет для розпізнавання.',
      'aborted': ''
    };
    if (statusEl && msgs[event.error] !== undefined) statusEl.textContent = msgs[event.error] || ('Помилка: ' + event.error);
  };

  recognition.onend = resetMic;

  try { recognition.start(); } catch(e) {
    resetMic();
    if (statusEl) statusEl.textContent = 'Помилка запуску мікрофона';
  }
}

function spShowResult(isCorrect, heard, target) {
  const resultEl = document.getElementById('spResult');
  const statusEl = document.getElementById('spStatus');
  spReveal();
  if (!resultEl) return;

  if (isCorrect) {
    spCorrect++;
    resultEl.className = 'sp-result ok';
    resultEl.innerHTML = `<div style="font-size:24px">✅</div><div style="font-weight:600;color:var(--moss)">Чудово! Правильно!</div><div style="font-size:12px;color:var(--ink-soft);margin-top:4px">Почув: «${escapeHtml(heard)}»</div>`;
    if (statusEl) statusEl.textContent = '🎉 Відмінно!';
    setTimeout(() => spStep(1), 1600);
  } else {
    spWrong++;
    resultEl.className = 'sp-result bad';
    resultEl.innerHTML = `<div style="font-size:24px">❌</div><div style="font-weight:600;color:var(--rust)">Правильно: «${escapeHtml(target)}»</div><div style="font-size:12px;color:var(--ink-soft);margin-top:4px">Почув: «${escapeHtml(heard)}»</div>`;
    if (statusEl) statusEl.textContent = '🔄 Спробуй ще раз';
  }
}

function spLevenshtein(a, b) {
  if (!a || !b) return Math.max((a||'').length, (b||'').length);
  const dp = Array.from({length: a.length+1}, (_, i) => Array.from({length: b.length+1}, (_, j) => i === 0 ? j : j === 0 ? i : 0));
  for (let i = 1; i <= a.length; i++)
    for (let j = 1; j <= b.length; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[a.length][b.length];
}

// ── Тренажер прикладів (писемний, з AI-перевіркою і підказкою) ──
let exPending = [];
let exPIdx = 0;
let exRecognition = null;
let exListening = false;
window._exLastCorrected = null;

function exPool() {
  return words.filter(w => w.examples.length === 0);
}

function renderExamples() {
  if (exRecognition) { try { exRecognition.abort(); } catch(e){} exListening = false; }
  exPending = exPool();
  if (exPIdx >= exPending.length) exPIdx = 0;
  const el = document.getElementById('examplesView');

  if (!exPending.length) {
    el.innerHTML = `<div class="ex-done-card"><div style="font-size:2.2rem">✅</div><div style="font-weight:700;margin-top:6px">Усі слова мають приклад!</div><div style="font-size:12px;color:var(--ink-soft);margin-top:4px">Додай нове слово або згенеруй нові приклади у списку.</div></div>`;
    return;
  }

  const w = exPending[exPIdx];

  el.innerHTML = `
    <div class="card-empty-hint">Слово ${exPIdx+1} / ${exPending.length}</div>
    <div class="ex-card">
      <div class="word-row" style="margin-bottom:12px">
        <div class="word-de">${escapeHtml(w.de)}</div>
        ${w.ua ? `<div class="word-ua">${escapeHtml(w.ua)}</div>` : ''}
      </div>
      <div style="font-size:12px;color:var(--ink-soft);margin-bottom:7px">Напиши своє речення по-німецьки:</div>
      <div style="position:relative">
        <textarea id="exInput" class="ex-textarea" placeholder="Речення..."></textarea>
        <button class="ex-mic-btn" id="exMicBtn" onclick="exMicToggle()">🎤</button>
      </div>
      <div id="exMicStatus" style="font-size:11px;color:var(--ink-soft);margin:4px 0 8px;min-height:14px"></div>
      <div id="exFeedback" class="ex-feedback"></div>
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <button class="add-btn" style="flex:1;background:#fff;color:var(--ink);border:1px solid var(--rule)" onclick="exSkip()">⏭ Пропустити</button>
        <button class="add-btn" style="flex:1" onclick="exCheck(${w.id})">✓ Перевірити</button>
      </div>
      <button class="add-btn" style="width:100%;background:var(--moss)" onclick="exAiSuggest(${w.id})">💡 Підказка від AI</button>
    </div>
  `;
}

function exSkip() {
  exPIdx = (exPIdx + 1) % Math.max(1, exPending.length);
  renderExamples();
}

function exMicToggle() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const btn = document.getElementById('exMicBtn');
  const status = document.getElementById('exMicStatus');
  const input = document.getElementById('exInput');
  if (!SpeechRecognition) { if (status) status.textContent = '❌ Тільки Chrome'; return; }

  if (exListening) {
    if (exRecognition) { try { exRecognition.abort(); } catch(e){} }
    exListening = false;
    if (btn) { btn.style.background = 'var(--moss)'; btn.textContent = '🎤'; }
    if (status) status.textContent = '';
    return;
  }
  if (exRecognition) { try { exRecognition.abort(); } catch(e){} }

  const recognition = new SpeechRecognition();
  recognition.lang = 'de-DE';
  recognition.interimResults = false;
  recognition.continuous = false;
  recognition.maxAlternatives = 1;
  exRecognition = recognition;
  exListening = true;

  if (btn) { btn.style.background = 'var(--rust)'; btn.textContent = '⏺'; }
  if (status) status.textContent = '🎙️ Говори по-німецьки...';

  recognition.onresult = function(e) {
    const text = e.results[0][0].transcript;
    if (input) {
      const cur = input.value.trim();
      const cap = text.charAt(0).toUpperCase() + text.slice(1);
      input.value = cur ? cur + ' ' + text : cap;
    }
    if (status) status.textContent = '✅ Розпізнано! Перевір текст і натисни "Перевірити"';
  };
  recognition.onerror = function(e) {
    if (status) {
      if (e.error === 'no-speech') status.textContent = '🤔 Нічого не почув';
      else if (e.error === 'not-allowed') status.textContent = '❌ Потрібен доступ до мікрофона';
      else status.textContent = '❌ Помилка: ' + e.error;
    }
  };
  recognition.onend = function() {
    exListening = false;
    if (btn) { btn.style.background = 'var(--moss)'; btn.textContent = '🎤'; }
  };
  try { recognition.start(); } catch(e) { if (status) status.textContent = '❌ Не вдалося запустити мікрофон'; exListening = false; }
}

const exTopics = [
  "робота і колеги в офісі", "побут вдома, прибирання, готування", "подорож або відпустка",
  "стосунки з друзями або сім'єю", "похід в магазин або ресторан", "спорт і здоров'я",
  "навчання або курси", "погода і плани на вихідні", "транспорт, дорога на роботу",
  "хобі і вільний час", "розмова по телефону з лікарем чи службою", "переїзд або пошук квартири"
];

async function exAiSuggest(wordId) {
  const w = words.find(x => x.id === wordId);
  if (!w) return;
  const fb = document.getElementById('exFeedback');
  fb.style.display = 'block';
  fb.style.background = '#fff';
  fb.style.border = '1px solid var(--rule)';
  fb.innerHTML = '<span class="ex-spin"></span> AI генерує приклад...';

  try {
    const topic = exTopics[Math.floor(Math.random()*exTopics.length)];
    const prompt = `Придумай 1 живий приклад речення рівня B1-B2 для слова: "${w.de}" (${w.ua || 'переклад невідомий'}).
Контекст ситуації: ${topic}.
Речення має звучати природно в цьому контексті.
ТІЛЬКИ JSON: {"de":"речення","ua":"переклад"}`;
    const text = await callAI(prompt);
    const clean = text.replace(/```json|```/g,'').trim();
    const m = clean.match(/\{[\s\S]*?\}/);
    if (!m) throw new Error();
    const ex = JSON.parse(m[0]);
    fb.style.background = 'var(--moss-bg)';
    fb.style.border = '1px solid #b9cdb6';
    fb.innerHTML = `
      <div style="font-weight:600;color:var(--moss);margin-bottom:6px">🤖 Варіант від AI:</div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--ink);background:#fff;padding:8px 10px;border-radius:6px;margin:4px 0">${escapeHtml(ex.de)}</div>
      <div style="font-size:12px;color:var(--moss);margin-top:3px;font-style:italic">${escapeHtml(ex.ua)}</div>
      <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
        <button class="add-btn" style="flex:1;min-width:110px" data-de="${escapeHtml(ex.de)}" data-ua="${escapeHtml(ex.ua)}" onclick="exSaveFromAttr(${w.id}, this)">✅ Зафіксувати</button>
        <button class="add-btn" style="flex:1;min-width:110px;background:var(--moss)" onclick="exAiSuggest(${w.id})">🔄 Ще інший</button>
      </div>`;
  } catch(e) {
    fb.innerHTML = '<div style="color:var(--rust)">❌ Помилка генерації, спробуй ще раз</div>';
  }
}

function exSaveFromAttr(wordId, btn) {
  exSaveDirect(wordId, btn.dataset.de, btn.dataset.ua);
}

async function exCheck(wordId) {
  const w = words.find(x => x.id === wordId);
  const input = document.getElementById('exInput');
  const own = input?.value.trim();
  if (!own) { toast('Напиши речення!'); return; }
  const fb = document.getElementById('exFeedback');
  fb.style.display = 'block';
  fb.style.background = '#fff';
  fb.style.border = '1px solid var(--rule)';
  fb.innerHTML = '<span class="ex-spin"></span> Перевіряю...';

  try {
    const prompt = `Перевір речення учня для слова "${w.de}" (${w.ua || ''}).
Речення: "${own}"
ТІЛЬКИ JSON: {"correct":true,"comment":"коментар українською","corrected":"виправлене або те саме","corrected_ua":"переклад"}`;
    const text = await callAI(prompt);
    const clean = text.replace(/```json|```/g,'').trim();
    const m = clean.match(/\{[\s\S]*?\}/);
    if (!m) throw new Error();
    const res = JSON.parse(m[0]);
    const ok = res.correct;
    window._exLastCorrected = { de: res.corrected || own, ua: res.corrected_ua || '' };
    fb.style.background = ok ? 'var(--moss-bg)' : '#fff3e0';
    fb.style.border = '1px solid ' + (ok ? '#b9cdb6' : '#f0c896');
    fb.innerHTML = `
      <div style="font-weight:600;color:${ok?'var(--moss)':'#c97a1f'};margin-bottom:5px">${ok?'✅ Правильно!':'⚠️ Є помилки'}</div>
      <div style="color:var(--ink-soft);margin-bottom:6px">${escapeHtml(res.comment||'')}</div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--ink);background:#fff;padding:8px 10px;border-radius:6px;margin:4px 0">${escapeHtml(res.corrected||'')}</div>
      <div style="font-size:12px;color:var(--moss);margin-top:3px;font-style:italic">${escapeHtml(res.corrected_ua||'')}</div>
      <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
        <button class="add-btn" style="flex:1;min-width:100px" onclick="exSaveCorrected(${w.id})">✅ Зафіксувати</button>
        <button class="add-btn" style="flex:1;min-width:100px;background:#fff;color:var(--ink);border:1px solid var(--rule)" onclick="exSkip()">⏭ Інше слово</button>
      </div>`;
  } catch(e) {
    fb.innerHTML = '<div style="color:var(--rust)">Помилка перевірки.</div>';
  }
}

function exSaveCorrected(wordId) {
  const c = window._exLastCorrected || {};
  exSaveDirect(wordId, c.de || '', c.ua || '');
}

function exSaveDirect(wordId, de, ua) {
  const w = words.find(x => x.id === wordId);
  if (!w) return;
  w.examples = [{ de, ua }];
  exampleVisible[w.id] = true;
  save();
  toast('✅ Приклад збережено!');
  renderExamples();
}

function escapeHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  const list = document.getElementById('list');

  document.getElementById('statTotal').textContent = words.length;
  document.getElementById('statDone').textContent = words.filter(w => w.examples.length >= 1).length;
  const todayStr = new Date().toDateString();
  document.getElementById('statToday').textContent = words.filter(w => new Date(w.added).toDateString() === todayStr).length;

  let shown = words;
  if (filter === 'new') shown = words.filter(w => w.examples.length === 0);
  if (filter === 'done') shown = words.filter(w => w.examples.length > 0);

  if (!shown.length) {
    list.innerHTML = `<div class="empty"><div class="empty-glyph">—</div>${words.length ? 'Нічого за цим фільтром' : 'Словник порожній. Додай перше слово вище.'}</div>`;
    return;
  }

  list.innerHTML = shown.map(w => `
    <div class="entry">
      <div class="entry-head">
        <div class="word-row">
          <div class="word-de">${escapeHtml(w.de)}</div>
          ${w.ua ? `<div class="word-ua">${escapeHtml(w.ua)}</div>` : ''}
        </div>
        <div class="entry-actions">
          <button class="icon-btn danger" onclick="deleteWord(${w.id})" title="Видалити">✕</button>
        </div>
      </div>
      ${w.examples.length ? `
        <button class="toggle-ex-btn" onclick="toggleExample(${w.id})">${exampleVisible[w.id] ? '▴ Сховати приклад' : '▾ Показати приклад'}</button>
        <div class="examples" style="display:${exampleVisible[w.id] ? 'block' : 'none'}">
          ${w.examples.map((ex, i) => `
            <div class="example-card">
              <div class="ex-de">${escapeHtml(ex.de)}</div>
              <div class="ex-ua">${escapeHtml(ex.ua)}</div>
            </div>
          `).join('')}
        </div>
      ` : ''}
      <button class="gen-btn" id="gen-${w.id}" onclick="generateExamples(${w.id})">
        ${w.examples.length ? '↻ Згенерувати новий приклад' : '✦ Згенерувати приклад'}
      </button>
    </div>
  `).join('');
}

document.getElementById('inDe').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('inUa').focus();
});
document.getElementById('inUa').addEventListener('keydown', e => {
  if (e.key === 'Enter') addWord();
});

load();
render();
</script>
